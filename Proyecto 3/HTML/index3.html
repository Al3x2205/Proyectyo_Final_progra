<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Filas de Gasolina</title>
    <link rel="stylesheet" href="../CSS/estilo.css">
</head>
<body>
    <header>
        <h1>⛽ Simulador: Logística de Filas de Combustible</h1>
        <p>Calcula tu tiempo de espera y la probabilidad de éxito en el surtidor.</p>
    </header>

    <main>
        <section class="tab-content active">
            <h2>Cálculo de Supervivencia en la Fila</h2>
            <form id="form-fila" onsubmit="return false;">
                <div class="input-group">
                    <label>Cantidad de vehículos delante de ti:</label>
                    <input type="number" id="autos" value="45" min="0">
                </div>
                <div class="input-group">
                    <label>Racionamiento máximo por vehículo (Litros):</label>
                    <input type="number" id="cupo" value="20" min="1">
                </div>
                <div class="input-group">
                    <label>Gasolina estimada disponible en el surtidor (Litros):</label>
                    <input type="number" id="stock" value="1000" min="0">
                </div>
                <div class="input-group">
                    <label>Tiempo de atención por vehículo (Minutos):</label>
                    <input type="number" id="tiempo" value="3" min="1">
                </div>
                <div class="btn-group">
                    <button class="btn-calc" onclick="simularFila()">Calcular Probabilidad</button>
                    <button class="btn-reset" type="reset">Limpiar</button>
                </div>
            </form>
            <div id="res-fila" class="resultado-box" style="display:none;"></div>
        </section>
    </main>

    <script src="../JS/simulador.js"></script>
</body>
</html>
