<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Estado de Sitio</title>
    <link rel="stylesheet" href="../CSS/estilo.css">
</head>
<body>
    <header>
        <h1>🚨 Simulador: Estado de Sitio y Restricciones</h1>
        <p>Calcula el riesgo de circulación y posibles multas durante toque de queda.</p>
    </header>

    <main>
        <section class="tab-content active">
            <h2>Control de Circulación</h2>
            <form id="form-sitio" onsubmit="return false;">
                <div class="input-group">
                    <label>Hora de inicio del Toque de Queda (Formato 0-23):</label>
                    <input type="number" id="hora-inicio" value="22" min="0" max="23">
                </div>
                <div class="input-group">
                    <label>Hora en la que estás en la calle (Formato 0-23):</label>
                    <input type="number" id="hora-calle" value="23" min="0" max="23">
                </div>
                <div class="input-group">
                    <label>¿Tienes pase de circulación médico/estratégico? (1 = Sí, 0 = No):</label>
                    <input type="number" id="pase" value="0" min="0" max="1">
                </div>
                <div class="input-group">
                    <label>Multa por hora de infracción (Bs.):</label>
                    <input type="number" id="multa-hora" value="500" min="0">
                </div>
                <div class="btn-group">
                    <button class="btn-calc" onclick="simularSitio()">Evaluar Riesgo</button>
                    <button class="btn-reset" type="reset">Limpiar</button>
                </div>
            </form>
            <div id="res-sitio" class="resultado-box" style="display:none;"></div>
        </section>
    </main>
     <script src="../JS/estadodesitio.js"></script>
</body>
</html>
